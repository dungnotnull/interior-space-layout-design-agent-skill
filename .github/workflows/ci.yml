name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.11"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/
      - name: Run end-to-end scenarios
        run: python tests/run_scenarios.py
      - name: Smoke-test the knowledge updater (no network deps)
        run: python tools/knowledge_updater.py --help
      - name: Upload PASS/FAIL log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pass-fail-log-${{ matrix.os }}-${{ matrix.python-version }}
          path: tests/PASS_FAIL_LOG.md
